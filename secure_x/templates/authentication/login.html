{%load static%}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberSense Hub - Login</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Login CSS -->
    <link rel="stylesheet" href="{%static 'css/login.css' %}">
</head>

<body>
    <header>Cyber<span>Sense</span> <br>HUB</header>

    <div class="auth-container">
        <form id="login-form" method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            {% if messages %}
            {% for message in messages %}
            <p style="color: red; text-align: center;">{{ message }}</p>
            {% endfor %}
            {% endif %}

            <input type="email" name="email" placeholder="Email" required>

            <div class="password-wrapper">
                <input type="password" name="password" placeholder="Password" id="password" required>
                <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('password')"></i>
            </div>

            <button type="submit">SIGN IN</button>

            <a href="{% url 'forgot_password' %}">Forgot password?</a>

            <p>Don't have an account? <a href="{% url 'signup' %}">Get started</a></p>
        </form>
    </div>

    <footer>
        <p>Sign in with</p>
        <div class="social-icons">
            <a href="#"><i class="fa-brands fa-facebook"></i></a>
            <a href="#"><i class="fa-brands fa-google"></i></a>
            <a href="#"><i class="fa-brands fa-microsoft"></i></a>
            <a href="#"><i class="fa-brands fa-apple"></i></a>
        </div>
    </footer>

    <script>
        function togglePassword(id) {
            const password = document.getElementById(id);
            const icon = password.nextElementSibling;

            if (password.type === 'password') {
                password.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                password.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</body>

</html>
